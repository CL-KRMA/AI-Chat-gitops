apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-chat-frontend
  namespace: ai-chat
  labels:
    app: ai-chat-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-chat-frontend
  template:
    metadata:
      labels:
        app: ai-chat-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/cl-krma/ai-chat-app:12502f8929fce442afc253765691d67b948a7f2e
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: OLLAMA_API_URL
              value: "http://ollama:11434"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ai-chat-frontend
  namespace: ai-chat
spec:
  selector:
    app: ai-chat-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
